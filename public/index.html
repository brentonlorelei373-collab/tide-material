<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIDE Material — 素材生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            'apple-bg': '#000000',
            'apple-card': '#1C1C1E',
            'apple-card-hover': '#2C2C2E',
            'apple-separator': '#38383A',
            'apple-gray': '#48484A',
            'apple-blue': '#0A84FF',
            'apple-blue-hover': '#409CFF',
            'apple-red': '#FF453A',
            'apple-green': '#30D158',
            'apple-orange': '#FF9F0A',
            'apple-text-primary': '#FFFFFF',
            'apple-text-secondary': '#98989D',
            'apple-text-tertiary': '#636366',
            'apple-fill': 'rgba(120, 120, 128, 0.24)',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background-color: #000000; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    .glass { background: rgba(28, 28, 30, 0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); }
    .glass-thick { background: rgba(28, 28, 30, 0.88); backdrop-filter: saturate(180%) blur(40px); -webkit-backdrop-filter: saturate(180%) blur(40px); }

    .apple-input {
      background: rgba(120, 120, 128, 0.16); border: 1px solid rgba(120, 120, 128, 0.24);
      border-radius: 12px; padding: 13px 16px; color: white; font-size: 15px;
      width: 100%; outline: none; transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1); letter-spacing: -0.01em;
    }
    .apple-input:focus { border-color: #0A84FF; box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.25); background: rgba(120, 120, 128, 0.24); }
    .apple-input::placeholder { color: #636366; }

    .apple-btn-primary {
      background: #0A84FF; color: white; font-size: 15px; font-weight: 600;
      padding: 13px 24px; border-radius: 12px; width: 100%; border: none; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1); letter-spacing: -0.01em;
    }
    .apple-btn-primary:hover { background: #409CFF; }
    .apple-btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .apple-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .apple-btn-secondary {
      background: rgba(120, 120, 128, 0.24); color: #0A84FF; font-size: 15px; font-weight: 600;
      padding: 13px 24px; border-radius: 12px; border: none; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .apple-btn-secondary:hover { background: rgba(120, 120, 128, 0.36); }
    .apple-btn-secondary:active { transform: scale(0.98); }

    .img-card { transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1); border-radius: 12px; overflow: hidden; }
    .img-card:hover { transform: scale(1.02); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .img-card:hover .img-overlay { opacity: 1; }
    .img-card:hover .fav-btn { opacity: 1; }

    .masonry { columns: 2; column-gap: 12px; }
    @media (min-width: 768px) { .masonry { columns: 3; column-gap: 16px; } }
    @media (min-width: 1024px) { .masonry { columns: 4; column-gap: 16px; } }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; }
    @media (min-width: 768px) { .masonry-item { margin-bottom: 16px; } }

    .apple-spinner { width: 32px; height: 32px; border: 3px solid rgba(120,120,128,0.24); border-top-color: #0A84FF; border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5,0,0.5,1) infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .scale-in { animation: scaleIn 0.35s cubic-bezier(0.25, 0.1, 0.25, 1); }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

    .tag-btn { transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1); background: rgba(120, 120, 128, 0.12); border: 1px solid rgba(120, 120, 128, 0.2); }
    .tag-btn:hover { background: rgba(120, 120, 128, 0.24); border-color: rgba(120, 120, 128, 0.36); }
    .tag-btn:active { transform: scale(0.96); }

    .history-item { transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1); border-radius: 10px; }
    .history-item:hover { background-color: rgba(120, 120, 128, 0.16); }
    .history-item:active { background-color: rgba(120, 120, 128, 0.24); }

    .segmented-control { background: rgba(120, 120, 128, 0.12); border-radius: 9px; padding: 2px; display: flex; }
    .segmented-btn { flex: 1; padding: 8px 16px; font-size: 13px; font-weight: 600; border-radius: 7px; color: #98989D; transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1); text-align: center; cursor: pointer; border: none; background: transparent; letter-spacing: -0.01em; }
    .segmented-btn.active { background: rgba(120, 120, 128, 0.36); color: #FFFFFF; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }

    .search-glow:focus-within { box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2), 0 8px 24px rgba(0,0,0,0.3); border-color: rgba(10, 132, 255, 0.5); }

    /* 收藏按钮 */
    .fav-btn {
      position: absolute; top: 10px; right: 10px; z-index: 10;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: all 0.2s ease; cursor: pointer; border: none;
    }
    .fav-btn:hover { background: rgba(0,0,0,0.7); transform: scale(1.1); }
    .fav-btn:active { transform: scale(0.9); }
    .fav-btn.is-fav { opacity: 1; }
    .fav-btn svg { width: 18px; height: 18px; transition: all 0.2s ease; }

    /* 收藏夹缩略图网格 */
    .fav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .fav-thumb {
      border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: all 0.2s ease; aspect-ratio: 1; position: relative;
    }
    .fav-thumb:hover { transform: scale(1.03); }
    .fav-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .fav-thumb .fav-remove {
      position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
      border-radius: 50%; background: rgba(0,0,0,0.6); display: flex;
      align-items: center; justify-content: center; opacity: 0;
      transition: opacity 0.2s; cursor: pointer; border: none;
    }
    .fav-thumb:hover .fav-remove { opacity: 1; }

    /* 频率限制提示条 */
    .rate-bar { height: 3px; border-radius: 2px; background: rgba(120,120,128,0.2); overflow: hidden; }
    .rate-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease, background 0.5s ease; }

    .modal-overlay { animation: overlayFade 0.3s ease; }
    @keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }

    ::selection { background: rgba(10, 132, 255, 0.3); }
  </style>
</head>
<body class="text-white antialiased">

  <!-- ==================== 登录/注册页面 ==================== -->
  <div id="authPage" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-[360px] fade-in">
      <div class="text-center mb-10">
        <div class="w-16 h-16 mx-auto mb-5 rounded-[20px] bg-gradient-to-b from-[#1C1C1E] to-[#0a0a0a] border border-[#38383A] flex items-center justify-center shadow-lg shadow-black/50">
          <span class="text-2xl font-bold tracking-wider bg-gradient-to-b from-white to-[#98989D] bg-clip-text text-transparent">T</span>
        </div>
        <h1 class="text-[28px] font-bold tracking-tight mb-1.5" style="letter-spacing: -0.02em;">TIDE Material</h1>
        <p class="text-[13px] text-apple-text-tertiary">高质量素材搜索平台</p>
      </div>

      <div class="segmented-control mb-7">
        <button id="tabLogin" onclick="switchTab('login')" class="segmented-btn active">登录</button>
        <button id="tabRegister" onclick="switchTab('register')" class="segmented-btn">注册</button>
      </div>

      <div id="loginForm">
        <div class="space-y-3">
          <input id="loginUsername" type="text" placeholder="用户名" class="apple-input" autocomplete="username" />
          <input id="loginPassword" type="password" placeholder="密码" class="apple-input" autocomplete="current-password" />
        </div>
        <button onclick="login()" id="loginBtn" class="apple-btn-primary mt-5">登录</button>
        <p id="loginError" class="text-apple-red text-[13px] text-center mt-4 hidden"></p>
      </div>

      <div id="registerForm" class="hidden">
        <div class="space-y-3">
          <input id="regUsername" type="text" placeholder="用户名（3-20 个字符）" class="apple-input" autocomplete="username" />
          <input id="regPassword" type="password" placeholder="密码（至少 6 个字符）" class="apple-input" autocomplete="new-password" />
          <input id="regPassword2" type="password" placeholder="确认密码" class="apple-input" autocomplete="new-password" />
        </div>
        <button onclick="register()" id="regBtn" class="apple-btn-primary mt-5">创建账户</button>
        <p id="regError" class="text-apple-red text-[13px] text-center mt-4 hidden"></p>
      </div>

      <p class="text-center text-apple-text-tertiary text-[12px] mt-10">免费使用 · 图片来源 Pexels</p>
    </div>
  </div>

  <!-- ==================== 主应用页面 ==================== -->
  <div id="appPage" class="hidden">

    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/[0.08]">
      <div class="max-w-7xl mx-auto px-6 h-12 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <span class="text-[15px] font-semibold tracking-tight" style="letter-spacing: -0.01em;">TIDE</span>
          <span class="text-[11px] text-apple-text-tertiary font-medium tracking-wide uppercase">Material</span>
        </div>
        <div class="flex items-center gap-1">
          <!-- 收藏按钮 -->
          <button onclick="openPanel('favorites')" class="h-8 px-3 rounded-lg text-[13px] text-apple-text-secondary hover:text-apple-red hover:bg-white/[0.06] transition-all duration-200 flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="hidden sm:inline">收藏</span>
          </button>
          <!-- 历史按钮 -->
          <button onclick="openPanel('history')" class="h-8 px-3 rounded-lg text-[13px] text-apple-text-secondary hover:text-white hover:bg-white/[0.06] transition-all duration-200 flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="hidden sm:inline">历史</span>
          </button>
          <div class="w-px h-4 bg-white/[0.08] mx-1"></div>
          <span id="navUsername" class="text-[13px] text-apple-text-secondary px-2"></span>
          <button onclick="logout()" class="h-8 px-3 rounded-lg text-[13px] text-apple-text-tertiary hover:text-apple-red hover:bg-white/[0.06] transition-all duration-200">退出</button>
        </div>
      </div>
    </nav>

    <main class="pt-12">
      <!-- Hero 搜索区 -->
      <section class="px-6 pt-24 pb-16">
        <div class="max-w-2xl mx-auto text-center">
          <h1 class="text-[42px] md:text-[52px] font-bold tracking-tight leading-[1.08] mb-4" style="letter-spacing: -0.03em;">
            输入灵感<span class="text-apple-text-tertiary">，</span><br/>获取素材<span class="text-apple-blue">。</span>
          </h1>
          <p class="text-apple-text-secondary text-[15px] leading-relaxed mb-4 max-w-md mx-auto" style="letter-spacing: -0.01em;">
            输入关键词或描述，从全球图库中搜寻最匹配的高质量图片
          </p>

          <!-- 频率限制指示器 -->
          <div id="rateInfo" class="hidden max-w-xs mx-auto mb-8">
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-[11px] text-apple-text-tertiary">本小时搜索配额</span>
              <span id="rateText" class="text-[11px] text-apple-text-secondary font-medium"></span>
            </div>
            <div class="rate-bar">
              <div id="rateBarFill" class="rate-bar-fill bg-apple-blue"></div>
            </div>
          </div>

          <!-- 搜索框 -->
          <div class="relative max-w-xl mx-auto search-glow rounded-2xl border border-white/[0.1] bg-apple-card transition-all duration-300">
            <div class="flex items-center">
              <svg class="ml-5 text-apple-text-tertiary flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="searchInput" type="text" placeholder="搜索素材..." class="flex-1 bg-transparent px-4 py-4 text-[15px] text-white placeholder-apple-text-tertiary outline-none" style="letter-spacing: -0.01em;" autocomplete="off" />
              <button id="searchBtn" onclick="searchImages()" class="mr-2 bg-apple-blue hover:bg-apple-blue-hover text-white text-[13px] font-semibold px-5 py-2 rounded-xl active:scale-95 transition-all duration-200 flex-shrink-0">搜索</button>
            </div>
          </div>

          <!-- 快捷标签 -->
          <div class="flex flex-wrap justify-center gap-2 mt-8">
            <button onclick="quickSearch('street fashion')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">街头穿搭</button>
            <button onclick="quickSearch('minimal interior')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">极简家居</button>
            <button onclick="quickSearch('coffee aesthetic')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">咖啡美学</button>
            <button onclick="quickSearch('nature landscape')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">自然风光</button>
            <button onclick="quickSearch('urban night')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">城市夜景</button>
            <button onclick="quickSearch('food photography')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">美食摄影</button>
          </div>
        </div>
      </section>

      <!-- 结果统计 -->
      <div id="resultInfo" class="hidden max-w-7xl mx-auto px-6 mb-5">
        <div class="flex items-center justify-between">
          <p class="text-[13px] text-apple-text-tertiary">
            搜索 "<span id="resultQuery" class="text-white font-medium"></span>" · <span id="resultCount" class="text-apple-text-secondary"></span> 张
          </p>
          <button onclick="loadMore()" id="loadMoreBtn" class="hidden text-[13px] text-apple-blue font-medium hover:text-apple-blue-hover transition-colors duration-200">加载更多</button>
        </div>
      </div>

      <!-- 图片网格 -->
      <section class="max-w-7xl mx-auto px-6 pb-24">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-24">
          <div class="apple-spinner mb-4"></div>
          <p class="text-[13px] text-apple-text-tertiary">正在搜索...</p>
        </div>
        <div id="emptyState" class="flex flex-col items-center justify-center py-24">
          <svg class="mb-5 text-apple-text-tertiary opacity-30" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p class="text-apple-text-tertiary text-[15px]">输入关键词开始搜索</p>
        </div>
        <div id="imageGrid" class="masonry"></div>
      </section>
    </main>

    <!-- 右侧面板 (历史 + 收藏 双标签) -->
    <div id="panelOverlay" class="fixed inset-0 bg-black/40 z-40 hidden" onclick="closePanel()"></div>
    <div id="sidePanel" class="fixed top-0 right-0 bottom-0 w-80 glass-thick border-l border-white/[0.08] z-50 transform translate-x-full overflow-y-auto" style="transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);">
      <div class="p-5 pt-4">
        <!-- 面板头部 -->
        <div class="flex items-center justify-between mb-4 h-12">
          <div class="segmented-control flex-1 mr-3">
            <button onclick="switchPanelTab('history')" id="panelTabHistory" class="segmented-btn active text-[12px] !py-1.5">历史</button>
            <button onclick="switchPanelTab('favorites')" id="panelTabFav" class="segmented-btn text-[12px] !py-1.5">收藏</button>
          </div>
          <button onclick="closePanel()" class="w-8 h-8 rounded-full bg-white/[0.08] hover:bg-white/[0.12] flex items-center justify-center transition-colors duration-200 flex-shrink-0">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- 历史列表 -->
        <div id="historyContent">
          <div id="historyList">
            <p class="text-apple-text-tertiary text-[13px] text-center py-8">暂无搜索记录</p>
          </div>
        </div>

        <!-- 收藏列表 -->
        <div id="favoritesContent" class="hidden">
          <div id="favoritesList">
            <p class="text-apple-text-tertiary text-[13px] text-center py-8">暂无收藏</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 图片预览弹窗 -->
    <div id="modal" class="fixed inset-0 z-[100] hidden">
      <div class="absolute inset-0 bg-black/80 backdrop-blur-xl modal-overlay" onclick="closeModal()"></div>
      <div class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6 scale-in">
        <button onclick="closeModal()" class="absolute top-5 right-5 w-9 h-9 rounded-full bg-white/[0.1] hover:bg-white/[0.2] flex items-center justify-center transition-all duration-200">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <img id="modalImg" src="" alt="" class="max-w-full max-h-[70vh] object-contain rounded-2xl shadow-2xl shadow-black/60" />
        <div class="mt-6 glass rounded-2xl px-6 py-4 flex items-center gap-4 border border-white/[0.08]">
          <div class="text-left">
            <p id="modalPhotographer" class="text-[14px] text-white font-medium"></p>
            <p id="modalSize" class="text-[12px] text-apple-text-tertiary mt-0.5"></p>
          </div>
          <div class="w-px h-8 bg-white/[0.1]"></div>
          <!-- 收藏按钮 -->
          <button onclick="toggleFavFromModal()" id="modalFavBtn" class="h-10 px-4 rounded-xl flex items-center gap-1.5 text-[13px] font-semibold transition-all duration-200" style="background: rgba(120,120,128,0.24); color: #FF453A;">
            <svg id="modalFavIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span id="modalFavText">收藏</span>
          </button>
          <a id="modalDownload" href="" target="_blank" download class="h-10 px-4 rounded-xl bg-apple-blue hover:bg-apple-blue-hover text-white text-[13px] font-semibold flex items-center gap-1.5 transition-all duration-200">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下载
          </a>
          <button onclick="copyImageUrl()" id="copyBtn" class="h-10 px-4 rounded-xl flex items-center gap-1.5 text-[13px] font-semibold transition-all duration-200" style="background: rgba(120,120,128,0.24); color: #0A84FF;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
        </div>
      </div>
    </div>

    function translateQuery(input) {
      let result = input.trim();
      let translated = [];
      for (const [cn, en] of Object.entries(keywordMap)) {
        if (result.includes(cn)) translated.push(en);
      }
      return translated.length > 0 ? translated.join(' ') : result;

    // ============ 初始化 ============
    async function init() {
      if (authToken) {
        try {
          const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + authToken } });
          if (res.ok) {
            const data = await res.json();
            currentUsername = data.username;
            showApp();
            loadFavoriteIds(); // 预加载收藏ID
            return;
          }
        } catch (e) {}
        localStorage.removeItem('tide_token');
        localStorage.removeItem('tide_username');
        authToken = null;
      }
      showAuth();
    }

    function showAuth() {
      document.getElementById('authPage').classList.remove('hidden');
      document.getElementById('appPage').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('appPage').classList.remove('hidden');
      document.getElementById('navUsername').textContent = currentUsername;
    }

    // ============ 登录/注册 ============
    function switchTab(tab) {
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      if (tab === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
      } else {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('loginForm').classList.add('hidden');
      }
      document.getElementById('loginError').classList.add('hidden');
      document.getElementById('regError').classList.add('hidden');
    }

    async function register() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      const errorEl = document.getElementById('regError');
      const btn = document.getElementById('regBtn');
      errorEl.classList.add('hidden');

      if (!username || !password) { showError(errorEl, '请填写用户名和密码'); return; }
      if (password !== password2) { showError(errorEl, '两次密码输入不一致'); return; }

      btn.textContent = '创建中...'; btn.disabled = true;
      try {
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '注册失败');
        authToken = data.token; currentUsername = data.username;
        localStorage.setItem('tide_token', authToken); localStorage.setItem('tide_username', currentUsername);
        showApp(); loadFavoriteIds();
      } catch (e) { showError(errorEl, e.message); } finally { btn.textContent = '创建账户'; btn.disabled = false; }
    }

    async function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      errorEl.classList.add('hidden');

      if (!username || !password) { showError(errorEl, '请填写用户名和密码'); return; }

      btn.textContent = '登录中...'; btn.disabled = true;
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        authToken = data.token; currentUsername = data.username;
        localStorage.setItem('tide_token', authToken); localStorage.setItem('tide_username', currentUsername);
        showApp(); loadFavoriteIds();
      } catch (e) { showError(errorEl, e.message); } finally { btn.textContent = '登录'; btn.disabled = false; }
    }

    function showError(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }

    async function logout() {
      try { await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + authToken } }); } catch (e) {}
      authToken = null; currentUsername = null; favoriteIds.clear(); favoritesData = [];
      localStorage.removeItem('tide_token'); localStorage.removeItem('tide_username');
      showAuth();
      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('regUsername').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regPassword2').value = '';
    }

    // ============ 收藏功能 ============
    async function loadFavoriteIds() {
      try {
        const res = await fetch('/api/favorites', { headers: { 'Authorization': 'Bearer ' + authToken } });
        const data = await res.json();
        if (data.favorites) {
          favoritesData = data.favorites;
          favoriteIds = new Set(data.favorites.map(f => String(f.photo_id)));
        }
      } catch (e) { console.error('加载收藏失败', e); }
    }

    async function toggleFavorite(photoId, photoUrl, photoThumb, photographer, width, height, originalUrl, btnEl) {
      const id = String(photoId);
      if (favoriteIds.has(id)) {
        // 取消收藏
        favoriteIds.delete(id);
        favoritesData = favoritesData.filter(f => String(f.photo_id) !== id);
        updateFavBtnUI(btnEl, false);
        try {
          await fetch('/api/favorites', {
            method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify({ photo_id: id })
          });
        } catch (e) { console.error('取消收藏失败', e); }
      } else {
        // 添加收藏
        favoriteIds.add(id);
        favoritesData.unshift({ photo_id: id, photo_url: photoUrl, photo_thumb: photoThumb, photographer, width, height, original_url: originalUrl });
        updateFavBtnUI(btnEl, true);
        try {
          await fetch('/api/favorites', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify({ photo_id: id, photo_url: photoUrl, photo_thumb: photoThumb, photographer, width, height, original_url: originalUrl })
          });
        } catch (e) { console.error('收藏失败', e); }
      }
    }

    function updateFavBtnUI(btnEl, isFav) {
      if (!btnEl) return;
      const svg = btnEl.querySelector('svg');
      if (isFav) {
        btnEl.classList.add('is-fav');
        svg.setAttribute('fill', '#FF453A');
        svg.setAttribute('stroke', '#FF453A');
      } else {
        btnEl.classList.remove('is-fav');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'white');
      }
    }

    function toggleFavFromModal() {
      if (!currentModalPhoto) return;
      const p = currentModalPhoto;
      // 找到网格中对应的收藏按钮
      const gridBtn = document.querySelector(`[data-photo-id="${p.id}"] .fav-btn`);
      toggleFavorite(p.id, p.photo_url, p.photo_thumb, p.photographer, p.width, p.height, p.original_url, gridBtn);
      updateModalFavUI();
    }

    function updateModalFavUI() {
      if (!currentModalPhoto) return;
      const isFav = favoriteIds.has(String(currentModalPhoto.id));
      const icon = document.getElementById('modalFavIcon');
      const text = document.getElementById('modalFavText');
      const btn = document.getElementById('modalFavBtn');
      if (isFav) {
        icon.setAttribute('fill', '#FF453A');
        text.textContent = '已收藏';
        btn.style.background = 'rgba(255, 69, 58, 0.15)';
      } else {
        icon.setAttribute('fill', 'none');
        text.textContent = '收藏';
        btn.style.background = 'rgba(120, 120, 128, 0.24)';
      }
    }

    // ============ 频率限制 UI ============
    function updateRateUI(remaining, limit) {
      rateRemaining = remaining;
      rateLimit = limit;
      const infoEl = document.getElementById('rateInfo');
      const textEl = document.getElementById('rateText');
      const fillEl = document.getElementById('rateBarFill');

      infoEl.classList.remove('hidden');
      textEl.textContent = `${remaining} / ${limit}`;
      const pct = (remaining / limit) * 100;
      fillEl.style.width = pct + '%';

      if (pct <= 20) {
        fillEl.className = 'rate-bar-fill bg-apple-red';
      } else if (pct <= 50) {
        fillEl.className = 'rate-bar-fill bg-apple-orange';
      } else {
        fillEl.className = 'rate-bar-fill bg-apple-blue';
      }
    }

    // ============ 搜索图片（通过后端代理）============
    async function searchImages(append = false) {
      const input = document.getElementById('searchInput');
      const query = input.value.trim();
      if (!query) return;

      if (!append) { currentQuery = query; currentPage = 1; }

      const translatedQuery = translateQuery(currentQuery);
      showLoading(true);
      if (!append) document.getElementById('imageGrid').innerHTML = '';
      document.getElementById('emptyState').classList.add('hidden');

      try {
        const url = `/api/search?query=${encodeURIComponent(translatedQuery)}&per_page=${PER_PAGE}&page=${currentPage}`;
        const response = await fetch(url, { headers: { 'Authorization': 'Bearer ' + authToken } });

        if (response.status === 429) {
          const data = await response.json();
          if (data._rate || data.rate) {
            const r = data._rate || data.rate;
            updateRateUI(r.remaining || 0, r.limit || rateLimit);
          }
          throw new Error(data.error || '搜索次数已用完，请稍后再试');
        }

        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.error || 'API 请求失败');
        }

        const data = await response.json();
        totalResults = data.total_results;

        // 更新频率限制显示
        if (data._rate) {
          updateRateUI(data._rate.remaining, data._rate.limit);
        }

        document.getElementById('resultInfo').classList.remove('hidden');
        document.getElementById('resultQuery').textContent = currentQuery;
        document.getElementById('resultCount').textContent = totalResults.toLocaleString();

        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (currentPage * PER_PAGE < totalResults) { loadMoreBtn.classList.remove('hidden'); }
        else { loadMoreBtn.classList.add('hidden'); }

        renderImages(data.photos, append);

        // 保存搜索历史
        if (!append && authToken) {
          fetch('/api/history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify({ query: currentQuery })
          }).catch(() => {});
        }
      } catch (error) {
        console.error('搜索失败:', error);
        if (!append) {
          document.getElementById('imageGrid').innerHTML = `
            <div class="col-span-full text-center py-24">
              <svg class="mx-auto mb-4 text-apple-text-tertiary opacity-30" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              <p class="text-apple-text-tertiary text-[15px]">${error.message}</p>
            </div>`;
        }
      } finally {
        showLoading(false);
      }
    }

    // ============ 渲染图片 ============
    function renderImages(photos, append) {
      const grid = document.getElementById('imageGrid');
      if (!append && photos.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-24">
            <svg class="mx-auto mb-4 text-apple-text-tertiary opacity-30" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <p class="text-apple-text-tertiary text-[15px]">没有找到相关图片，换个关键词试试</p>
          </div>`;
        return;
      }

      const fragment = document.createDocumentFragment();
      photos.forEach((photo, index) => {
        const isFav = favoriteIds.has(String(photo.id));
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.style.animation = `fadeIn 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) ${index * 0.04}s both`;
        item.innerHTML = `
          <div class="img-card relative cursor-pointer bg-apple-card group" data-photo-id="${photo.id}"
               onclick="openModal(${photo.id}, '${photo.src.large2x}', '${photo.photographer.replace(/'/g, "\\'")}', ${photo.width}, ${photo.height}, '${photo.src.original}', '${photo.src.medium}')">
            <img src="${photo.src.medium}" alt="${(photo.alt || photo.photographer).replace(/"/g, '&quot;')}" loading="lazy" class="w-full block"
                 style="aspect-ratio: ${photo.width}/${photo.height}" />
            <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="event.stopPropagation(); toggleFavorite(${photo.id}, '${photo.src.large2x}', '${photo.src.medium}', '${photo.photographer.replace(/'/g, "\\'")}', ${photo.width}, ${photo.height}, '${photo.src.original}', this)">
              <svg viewBox="0 0 24 24" fill="${isFav ? '#FF453A' : 'none'}" stroke="${isFav ? '#FF453A' : 'white'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
            <div class="img-overlay absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-black/0 opacity-0 transition-opacity duration-300 flex flex-col justify-end p-4 pointer-events-none">
              <p class="text-white text-[13px] font-medium">${photo.photographer}</p>
              <p class="text-white/50 text-[11px] mt-0.5">${photo.width} × ${photo.height}</p>
            </div>
          </div>`;
        fragment.appendChild(item);
      });
      grid.appendChild(fragment);
    }

    function loadMore() { currentPage++; searchImages(true); }

    function quickSearch(query) {
      document.getElementById('searchInput').value = query;
      currentQuery = query;
      searchImages();
    }

    // ============ 侧边面板（历史 + 收藏）============
    function openPanel(tab) {
      panelTab = tab || 'history';
      const panel = document.getElementById('sidePanel');
      const overlay = document.getElementById('panelOverlay');
      panel.style.transform = 'translateX(0)';
      overlay.classList.remove('hidden');
      panelOpen = true;
      switchPanelTab(panelTab);
    }

    function closePanel() {
      document.getElementById('sidePanel').style.transform = 'translateX(100%)';
      document.getElementById('panelOverlay').classList.add('hidden');
      panelOpen = false;
    }

    function switchPanelTab(tab) {
      panelTab = tab;
      const historyTab = document.getElementById('panelTabHistory');
      const favTab = document.getElementById('panelTabFav');
      const historyContent = document.getElementById('historyContent');
      const favContent = document.getElementById('favoritesContent');

      if (tab === 'history') {
        historyTab.classList.add('active'); favTab.classList.remove('active');
        historyContent.classList.remove('hidden'); favContent.classList.add('hidden');
        loadHistory();
      } else {
        favTab.classList.add('active'); historyTab.classList.remove('active');
        favContent.classList.remove('hidden'); historyContent.classList.add('hidden');
        renderFavoritesPanel();
      }
    }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '<div class="flex justify-center py-8"><div class="apple-spinner"></div></div>';

      try {
        const res = await fetch('/api/history', { headers: { 'Authorization': 'Bearer ' + authToken } });
        const data = await res.json();

        if (!data.history || data.history.length === 0) {
          list.innerHTML = '<p class="text-apple-text-tertiary text-[13px] text-center py-8">暂无搜索记录</p>';
          return;
        }

        list.innerHTML = data.history.map(item => {
          const time = new Date(item.created_at).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          return `
            <div class="history-item flex items-center justify-between py-3 px-3 cursor-pointer -mx-1" onclick="quickSearch('${item.query.replace(/'/g, "\\'")}')">
              <div class="min-w-0">
                <p class="text-[14px] text-white truncate" style="letter-spacing: -0.01em;">${item.query}</p>
                <p class="text-[11px] text-apple-text-tertiary mt-0.5">${time}</p>
              </div>
              <svg class="flex-shrink-0 ml-2 text-apple-text-tertiary" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>`;
        }).join('');
      } catch (e) {
        list.innerHTML = '<p class="text-apple-text-tertiary text-[13px] text-center py-8">加载失败</p>';
      }
    }

    function renderFavoritesPanel() {
      const list = document.getElementById('favoritesList');
      if (favoritesData.length === 0) {
        list.innerHTML = '<p class="text-apple-text-tertiary text-[13px] text-center py-8">暂无收藏</p>';
        return;
      }

      list.innerHTML = `
        <p class="text-[12px] text-apple-text-tertiary mb-3">${favoritesData.length} 张收藏</p>
        <div class="fav-grid">
          ${favoritesData.map(f => `
            <div class="fav-thumb" onclick="openModal('${f.photo_id}', '${f.photo_url}', '${(f.photographer || '').replace(/'/g, "\\'")}', ${f.width || 0}, ${f.height || 0}, '${f.original_url || f.photo_url}', '${f.photo_thumb || f.photo_url}')">
              <img src="${f.photo_thumb || f.photo_url}" alt="${f.photographer || ''}" loading="lazy" />
              <button class="fav-remove" onclick="event.stopPropagation(); removeFavFromPanel('${f.photo_id}', this)">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
          `).join('')}
        </div>`;
    }

    async function removeFavFromPanel(photoId, btnEl) {
      const id = String(photoId);
      favoriteIds.delete(id);
      favoritesData = favoritesData.filter(f => String(f.photo_id) !== id);
      // 更新网格中的收藏按钮
      const gridCard = document.querySelector(`[data-photo-id="${id}"] .fav-btn`);
      if (gridCard) updateFavBtnUI(gridCard, false);
      renderFavoritesPanel();
      try {
        await fetch('/api/favorites', {
          method: 'DELETE', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
          body: JSON.stringify({ photo_id: id })
        });
      } catch (e) { console.error('取消收藏失败', e); }
    }

    // ============ 弹窗预览 ============
    function openModal(photoId, imgUrl, photographer, width, height, originalUrl, thumbUrl) {
      currentModalPhoto = { id: String(photoId), photo_url: imgUrl, photo_thumb: thumbUrl || imgUrl, photographer, width, height, original_url: originalUrl };
      document.getElementById('modalImg').src = imgUrl;
      document.getElementById('modalPhotographer').textContent = photographer;
      document.getElementById('modalSize').textContent = width + ' × ' + height;
      document.getElementById('modalDownload').href = originalUrl;
      document.getElementById('modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      updateModalFavUI();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.style.overflow = '';
      currentModalPhoto = null;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!document.getElementById('modal').classList.contains('hidden')) closeModal();
        else if (panelOpen) closePanel();
      }
    });

    function copyImageUrl() {
      const url = document.getElementById('modalDownload').href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
        setTimeout(() => { btn.innerHTML = orig; }, 2000);
      });
    }

    function showLoading(show) { document.getElementById('loading').classList.toggle('hidden', !show); }

    // 回车键支持
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (!document.getElementById('authPage').classList.contains('hidden')) {
          if (!document.getElementById('loginForm').classList.contains('hidden')) login();
          else register();
        }
        if (document.activeElement === document.getElementById('searchInput')) searchImages();
      }
    });

    // ============ 启动 ============
    init();
  </script>

</body>
</html>
