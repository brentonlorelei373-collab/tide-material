<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIDE Material — 素材生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            'apple-bg': '#000000',
            'apple-card': '#1C1C1E',
            'apple-card-hover': '#2C2C2E',
            'apple-separator': '#38383A',
            'apple-gray': '#48484A',
            'apple-blue': '#0A84FF',
            'apple-blue-hover': '#409CFF',
            'apple-text-primary': '#FFFFFF',
            'apple-text-secondary': '#98989D',
            'apple-text-tertiary': '#636366',
            'apple-fill': 'rgba(120, 120, 128, 0.24)',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
          },
          borderRadius: {
            'apple': '12px',
            'apple-lg': '16px',
            'apple-xl': '20px',
            'apple-2xl': '24px',
          }
        }
      }
    }
  </script>
  <style>
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: #000000;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Apple-style scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

    /* Apple glass material */
    .glass {
      background: rgba(28, 28, 30, 0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    .glass-thick {
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: saturate(180%) blur(40px);
      -webkit-backdrop-filter: saturate(180%) blur(40px);
    }

    /* Apple-style input focus */
    .apple-input {
      background: rgba(120, 120, 128, 0.16);
      border: 1px solid rgba(120, 120, 128, 0.24);
      border-radius: 12px;
      padding: 13px 16px;
      color: white;
      font-size: 15px;
      width: 100%;
      outline: none;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      letter-spacing: -0.01em;
    }
    .apple-input:focus {
      border-color: #0A84FF;
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.25);
      background: rgba(120, 120, 128, 0.24);
    }
    .apple-input::placeholder { color: #636366; }

    /* Apple-style primary button */
    .apple-btn-primary {
      background: #0A84FF;
      color: white;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 24px;
      border-radius: 12px;
      width: 100%;
      border: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      letter-spacing: -0.01em;
    }
    .apple-btn-primary:hover { background: #409CFF; }
    .apple-btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .apple-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Apple-style secondary button */
    .apple-btn-secondary {
      background: rgba(120, 120, 128, 0.24);
      color: #0A84FF;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .apple-btn-secondary:hover { background: rgba(120, 120, 128, 0.36); }
    .apple-btn-secondary:active { transform: scale(0.98); }

    /* Image card hover */
    .img-card {
      transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
      border-radius: 12px;
      overflow: hidden;
    }
    .img-card:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .img-card:hover .img-overlay { opacity: 1; }

    /* Masonry grid */
    .masonry { columns: 2; column-gap: 12px; }
    @media (min-width: 768px) { .masonry { columns: 3; column-gap: 16px; } }
    @media (min-width: 1024px) { .masonry { columns: 4; column-gap: 16px; } }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; }
    @media (min-width: 768px) { .masonry-item { margin-bottom: 16px; } }

    /* Apple loading spinner */
    .apple-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(120, 120, 128, 0.24);
      border-top-color: #0A84FF;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fade in animation */
    .fade-in {
      animation: fadeIn 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Scale in for modal */
    .scale-in {
      animation: scaleIn 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Tag button */
    .tag-btn {
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      background: rgba(120, 120, 128, 0.12);
      border: 1px solid rgba(120, 120, 128, 0.2);
    }
    .tag-btn:hover {
      background: rgba(120, 120, 128, 0.24);
      border-color: rgba(120, 120, 128, 0.36);
    }
    .tag-btn:active { transform: scale(0.96); }

    /* History panel */
    .history-item {
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      border-radius: 10px;
    }
    .history-item:hover {
      background-color: rgba(120, 120, 128, 0.16);
    }
    .history-item:active {
      background-color: rgba(120, 120, 128, 0.24);
    }

    /* Segmented control (Apple-style tab) */
    .segmented-control {
      background: rgba(120, 120, 128, 0.12);
      border-radius: 9px;
      padding: 2px;
      display: flex;
      position: relative;
    }
    .segmented-btn {
      flex: 1;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 7px;
      color: #98989D;
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      text-align: center;
      cursor: pointer;
      border: none;
      background: transparent;
      letter-spacing: -0.01em;
    }
    .segmented-btn.active {
      background: rgba(120, 120, 128, 0.36);
      color: #FFFFFF;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* Search box glow */
    .search-glow:focus-within {
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2), 0 8px 24px rgba(0,0,0,0.3);
      border-color: rgba(10, 132, 255, 0.5);
    }

    /* Tooltip animation */
    .tooltip-enter {
      animation: tooltipFade 0.2s ease;
    }
    @keyframes tooltipFade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Smooth overlay */
    .modal-overlay {
      animation: overlayFade 0.3s ease;
    }
    @keyframes overlayFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Selection color */
    ::selection {
      background: rgba(10, 132, 255, 0.3);
    }
  </style>
</head>
<body class="text-white antialiased">

  <!-- ==================== 登录/注册页面 (Apple ID 风格) ==================== -->
  <div id="authPage" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-[360px] fade-in">
      <!-- Logo -->
      <div class="text-center mb-10">
        <div class="w-16 h-16 mx-auto mb-5 rounded-apple-xl bg-gradient-to-b from-[#1C1C1E] to-[#0a0a0a] border border-[#38383A] flex items-center justify-center shadow-lg shadow-black/50">
          <span class="text-2xl font-bold tracking-wider bg-gradient-to-b from-white to-[#98989D] bg-clip-text text-transparent">T</span>
        </div>
        <h1 class="text-[28px] font-bold tracking-tight mb-1.5" style="letter-spacing: -0.02em;">TIDE Material</h1>
        <p class="text-[13px] text-apple-text-tertiary">高质量素材搜索平台</p>
      </div>

      <!-- Apple-style 分段控制器 -->
      <div class="segmented-control mb-7">
        <button id="tabLogin" onclick="switchTab('login')" class="segmented-btn active">登录</button>
        <button id="tabRegister" onclick="switchTab('register')" class="segmented-btn">注册</button>
      </div>

      <!-- 登录表单 -->
      <div id="loginForm">
        <div class="space-y-3">
          <div>
            <input id="loginUsername" type="text" placeholder="用户名" class="apple-input" autocomplete="username" />
          </div>
          <div>
            <input id="loginPassword" type="password" placeholder="密码" class="apple-input" autocomplete="current-password" />
          </div>
        </div>
        <button onclick="login()" id="loginBtn" class="apple-btn-primary mt-5">
          登录
        </button>
        <p id="loginError" class="text-[#FF453A] text-[13px] text-center mt-4 hidden"></p>
      </div>

      <!-- 注册表单 -->
      <div id="registerForm" class="hidden">
        <div class="space-y-3">
          <div>
            <input id="regUsername" type="text" placeholder="用户名（3-20 个字符）" class="apple-input" autocomplete="username" />
          </div>
          <div>
            <input id="regPassword" type="password" placeholder="密码（至少 6 个字符）" class="apple-input" autocomplete="new-password" />
          </div>
          <div>
            <input id="regPassword2" type="password" placeholder="确认密码" class="apple-input" autocomplete="new-password" />
          </div>
        </div>
        <button onclick="register()" id="regBtn" class="apple-btn-primary mt-5">
          创建账户
        </button>
        <p id="regError" class="text-[#FF453A] text-[13px] text-center mt-4 hidden"></p>
      </div>

      <p class="text-center text-apple-text-tertiary text-[12px] mt-10">免费使用 · 图片来源 Pexels</p>
    </div>
  </div>

  <!-- ==================== 主应用页面 ==================== -->
  <div id="appPage" class="hidden">

    <!-- Apple 风格导航栏 (磨砂玻璃) -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/[0.08]">
      <div class="max-w-7xl mx-auto px-6 h-12 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <span class="text-[15px] font-semibold tracking-tight" style="letter-spacing: -0.01em;">TIDE</span>
          <span class="text-[11px] text-apple-text-tertiary font-medium tracking-wide uppercase">Material</span>
        </div>
        <div class="flex items-center gap-1">
          <button onclick="toggleHistory()" class="h-8 px-3 rounded-lg text-[13px] text-apple-text-secondary hover:text-white hover:bg-white/[0.06] transition-all duration-200 flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="hidden sm:inline">历史</span>
          </button>
          <div class="w-px h-4 bg-white/[0.08] mx-1"></div>
          <span id="navUsername" class="text-[13px] text-apple-text-secondary px-2"></span>
          <button onclick="logout()" class="h-8 px-3 rounded-lg text-[13px] text-apple-text-tertiary hover:text-[#FF453A] hover:bg-white/[0.06] transition-all duration-200">退出</button>
        </div>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main class="pt-12">

      <!-- Hero 搜索区 -->
      <section class="px-6 pt-24 pb-16">
        <div class="max-w-2xl mx-auto text-center">
          <h1 class="text-[42px] md:text-[52px] font-bold tracking-tight leading-[1.08] mb-4" style="letter-spacing: -0.03em;">
            输入灵感<span class="text-apple-text-tertiary">，</span><br/>获取素材<span class="text-apple-blue">。</span>
          </h1>
          <p class="text-apple-text-secondary text-[15px] leading-relaxed mb-12 max-w-md mx-auto" style="letter-spacing: -0.01em;">
            输入关键词或描述，从全球图库中搜寻最匹配的高质量图片
          </p>

          <!-- Apple Spotlight 风格搜索框 -->
          <div class="relative max-w-xl mx-auto search-glow rounded-2xl border border-white/[0.1] bg-apple-card transition-all duration-300">
            <div class="flex items-center">
              <svg class="ml-5 text-apple-text-tertiary flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input
                id="searchInput"
                type="text"
                placeholder="搜索素材..."
                class="flex-1 bg-transparent px-4 py-4 text-[15px] text-white placeholder-apple-text-tertiary outline-none"
                style="letter-spacing: -0.01em;"
                autocomplete="off"
              />
              <button
                id="searchBtn"
                onclick="searchImages()"
                class="mr-2 bg-apple-blue hover:bg-apple-blue-hover text-white text-[13px] font-semibold px-5 py-2 rounded-xl active:scale-95 transition-all duration-200 flex-shrink-0"
              >
                搜索
              </button>
            </div>
          </div>

          <!-- 快捷标签 (Apple 风格胶囊按钮) -->
          <div class="flex flex-wrap justify-center gap-2 mt-8">
            <button onclick="quickSearch('street fashion')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">街头穿搭</button>
            <button onclick="quickSearch('minimal interior')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">极简家居</button>
            <button onclick="quickSearch('coffee aesthetic')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">咖啡美学</button>
            <button onclick="quickSearch('nature landscape')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">自然风光</button>
            <button onclick="quickSearch('urban night')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">城市夜景</button>
            <button onclick="quickSearch('food photography')" class="tag-btn text-[13px] text-apple-text-secondary rounded-full px-4 py-2">美食摄影</button>
          </div>
        </div>
      </section>

      <!-- 结果统计 -->
      <div id="resultInfo" class="hidden max-w-7xl mx-auto px-6 mb-5">
        <div class="flex items-center justify-between">
          <p class="text-[13px] text-apple-text-tertiary">
            搜索 "<span id="resultQuery" class="text-white font-medium"></span>" · <span id="resultCount" class="text-apple-text-secondary"></span> 张
          </p>
          <button onclick="loadMore()" id="loadMoreBtn" class="hidden text-[13px] text-apple-blue font-medium hover:text-apple-blue-hover transition-colors duration-200">
            加载更多
          </button>
        </div>
      </div>

      <!-- 图片网格 -->
      <section class="max-w-7xl mx-auto px-6 pb-24">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-24">
          <div class="apple-spinner mb-4"></div>
          <p class="text-[13px] text-apple-text-tertiary">正在搜索...</p>
        </div>
        <div id="emptyState" class="flex flex-col items-center justify-center py-24">
          <svg class="mb-5 text-apple-text-tertiary opacity-30" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <p class="text-apple-text-tertiary text-[15px]">输入关键词开始搜索</p>
        </div>
        <div id="imageGrid" class="masonry"></div>
      </section>
    </main>

    <!-- 搜索历史侧边栏 (Apple 风格面板) -->
    <div id="historyOverlay" class="fixed inset-0 bg-black/40 z-40 hidden" onclick="toggleHistory()"></div>
    <div id="historyPanel" class="fixed top-0 right-0 bottom-0 w-80 glass-thick border-l border-white/[0.08] z-50 transform translate-x-full transition-transform duration-[350ms] cubic-bezier(0.25, 0.1, 0.25, 1) overflow-y-auto" style="transition-timing-function: cubic-bezier(0.25, 0.1, 0.25, 1);">
      <div class="p-5 pt-4">
        <div class="flex items-center justify-between mb-5 h-12">
          <h3 class="text-[15px] font-semibold" style="letter-spacing: -0.01em;">搜索历史</h3>
          <button onclick="toggleHistory()" class="w-8 h-8 rounded-full bg-white/[0.08] hover:bg-white/[0.12] flex items-center justify-center transition-colors duration-200">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="historyList">
          <p class="text-apple-text-tertiary text-[13px]">暂无搜索记录</p>

    <!-- 图片预览弹窗 (Apple QuickLook 风格) -->

      <div class="relative z-10 flex flex-col items-center justify-center min-h-screen p-6 scale-in">
        <!-- 顶部关闭按钮 -->
        <button onclick="closeModal()" class="absolute top-5 right-5 w-9 h-9 rounded-full bg-white/[0.1] hover:bg-white/[0.2] flex items-center justify-center transition-all duration-200">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <!-- 图片 -->
        <img id="modalImg" src="" alt="" class="max-w-full max-h-[70vh] object-contain rounded-apple-lg shadow-2xl shadow-black/60" />
        <!-- 底部信息栏 -->
        <div class="mt-6 glass rounded-apple-lg px-6 py-4 flex items-center gap-5 border border-white/[0.08]">
          <div class="text-left">
            <p id="modalPhotographer" class="text-[14px] text-white font-medium"></p>
            <p id="modalSize" class="text-[12px] text-apple-text-tertiary mt-0.5"></p>
          </div>
          <div class="w-px h-8 bg-white/[0.1]"></div>
          <a id="modalDownload" href="" target="_blank" download class="apple-btn-primary !w-auto !py-2.5 !px-5 !text-[13px] !rounded-[10px] flex items-center gap-1.5">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下载
          </a>
          <button onclick="copyImageUrl()" id="copyBtn" class="apple-btn-secondary !w-auto !py-2.5 !px-5 !text-[13px] !rounded-[10px] flex items-center gap-1.5">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
        </div>
      </div>
    </div>

    <!-- 底部 -->
    <footer class="border-t border-white/[0.06] py-8 text-center">
      <p class="text-[12px] text-apple-text-tertiary">TIDE Material · 图片来源 <a href="https://www.pexels.com" target="_blank" class="text-apple-blue hover:text-apple-blue-hover transition-colors duration-200">Pexels</a> · 免费可商用</p>
    </footer>
  </div>

  <script>
    // ============ 配置 ============
    const PEXELS_API_KEY = 'QzRQUCCS2KSutNKlsXUE81M0zkPm56V01Nh0DrTW4nZZQOY939KBxhct';
    const PER_PAGE = 20;

    // ============ 状态 ============
    let currentQuery = '';
    let currentPage = 1;
    let totalResults = 0;
    let authToken = localStorage.getItem('tide_token');
    let currentUsername = localStorage.getItem('tide_username');
    let historyOpen = false;

    // ============ 初始化 ============
    async function init() {
      if (authToken) {
        try {
          const res = await fetch('/api/me', {
            headers: { 'Authorization': 'Bearer ' + authToken }
          });
          if (res.ok) {
            const data = await res.json();
            currentUsername = data.username;
            showApp();
            return;
          }
        } catch (e) {}
        localStorage.removeItem('tide_token');
        localStorage.removeItem('tide_username');
        authToken = null;
      }
      showAuth();
    }

    function showAuth() {
      document.getElementById('authPage').classList.remove('hidden');
      document.getElementById('appPage').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('appPage').classList.remove('hidden');
      document.getElementById('navUsername').textContent = currentUsername;
    }

    // ============ 登录/注册切换 (分段控制器) ============
    function switchTab(tab) {
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      if (tab === 'login') {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
      document.getElementById('loginError').classList.add('hidden');
      document.getElementById('regError').classList.add('hidden');
    }

    // ============ 注册 ============
    async function register() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      const errorEl = document.getElementById('regError');
      const btn = document.getElementById('regBtn');

      errorEl.classList.add('hidden');

      if (!username || !password) {
        errorEl.textContent = '请填写用户名和密码';
        errorEl.classList.remove('hidden');
        return;
      }

      if (password !== password2) {
        errorEl.textContent = '两次密码输入不一致';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.textContent = '创建中...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { throw new Error('服务器返回异常，请确认 D1 数据库已绑定'); }

        if (!res.ok) {
          throw new Error(data.error || '注册失败');
        }

        authToken = data.token;
        currentUsername = data.username;
        localStorage.setItem('tide_token', authToken);
        localStorage.setItem('tide_username', currentUsername);
        showApp();
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.textContent = '创建账户';
        btn.disabled = false;
      }
    }

    // ============ 登录 ============
    async function login() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.classList.add('hidden');

      if (!username || !password) {
        errorEl.textContent = '请填写用户名和密码';
        errorEl.classList.remove('hidden');
        return;
      }

      btn.textContent = '登录中...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch(e) { throw new Error('服务器返回异常，请确认 D1 数据库已绑定'); }

        if (!res.ok) {
          throw new Error(data.error || '登录失败');
        }

        authToken = data.token;
        currentUsername = data.username;
        localStorage.setItem('tide_token', authToken);
        localStorage.setItem('tide_username', currentUsername);
        showApp();
      } catch (error) {
        errorEl.textContent = error.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.textContent = '登录';
        btn.disabled = false;
      }
    }

    // ============ 登出 ============
    async function logout() {
      try {
        await fetch('/api/logout', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
      } catch (e) {}

      authToken = null;
      currentUsername = null;
      localStorage.removeItem('tide_token');
      localStorage.removeItem('tide_username');
      showAuth();

      document.getElementById('loginUsername').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('regUsername').value = '';
      document.getElementById('regPassword').value = '';
      document.getElementById('regPassword2').value = '';
    }

    // ============ 中文→英文关键词映射 ============
    const keywordMap = {
      '穿搭': 'fashion outfit', '街头': 'street style', '夏日': 'summer',
      '冬日': 'winter', '春天': 'spring', '秋天': 'autumn fall',
      '极简': 'minimal', '家居': 'interior home', '咖啡': 'coffee',
      '美食': 'food', '风景': 'landscape scenery', '城市': 'urban city',
      '夜景': 'night city lights', '海边': 'beach ocean', '森林': 'forest',
      '建筑': 'architecture', '人像': 'portrait', '黑白': 'black and white',
      '复古': 'vintage retro', '科技': 'technology', '潮牌': 'streetwear',
      '运动': 'sport fitness', '旅行': 'travel', '花': 'flowers',
      '猫': 'cat', '狗': 'dog', '日落': 'sunset', '星空': 'starry sky',
      '雨天': 'rainy day', '书': 'books reading', '音乐': 'music',
      '艺术': 'art', '设计': 'design', '清凉': 'cool fresh',
      '温暖': 'warm cozy', '简约': 'simple clean', '奢华': 'luxury',
      '街拍': 'street photography', 'ins风': 'instagram aesthetic',
      '氛围感': 'moody aesthetic', '高级感': 'elegant premium',
    };

    function translateQuery(input) {
      let result = input.trim();
      let translated = [];
      for (const [cn, en] of Object.entries(keywordMap)) {
        if (result.includes(cn)) translated.push(en);
      }
      return translated.length > 0 ? translated.join(' ') : result;
    }

    // ============ 搜索图片 ============
    async function searchImages(append = false) {
      const input = document.getElementById('searchInput');
      const query = input.value.trim();
      if (!query) return;

      if (!append) {
        currentQuery = query;
        currentPage = 1;
      }

      const translatedQuery = translateQuery(currentQuery);
      showLoading(true);
      if (!append) document.getElementById('imageGrid').innerHTML = '';
      document.getElementById('emptyState').classList.add('hidden');

      try {
        const url = `https://api.pexels.com/v1/search?query=${encodeURIComponent(translatedQuery)}&per_page=${PER_PAGE}&page=${currentPage}`;
        const response = await fetch(url, { headers: { 'Authorization': PEXELS_API_KEY } });
        if (!response.ok) throw new Error('API 请求失败');

        const data = await response.json();
        totalResults = data.total_results;

        document.getElementById('resultInfo').classList.remove('hidden');
        document.getElementById('resultQuery').textContent = currentQuery;
        document.getElementById('resultCount').textContent = totalResults.toLocaleString();

        const loadMoreBtn = document.getElementById('loadMoreBtn');
        if (currentPage * PER_PAGE < totalResults) {
          loadMoreBtn.classList.remove('hidden');
        } else {
          loadMoreBtn.classList.add('hidden');
        }

        renderImages(data.photos, append);

        if (!append && authToken) {
          fetch('/api/history', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + authToken
            },
            body: JSON.stringify({ query: currentQuery })
          }).catch(() => {});
        }

      } catch (error) {
        console.error('搜索失败:', error);
        if (!append) {
          document.getElementById('imageGrid').innerHTML = `
            <div class="col-span-full text-center py-24">
              <svg class="mx-auto mb-4 text-apple-text-tertiary opacity-30" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              <p class="text-apple-text-tertiary text-[15px]">搜索出错了，请稍后重试</p>
            </div>`;
        }
      } finally {
        showLoading(false);
      }
    }

    // ============ 渲染图片 ============
    function renderImages(photos, append) {
      const grid = document.getElementById('imageGrid');
      if (!append && photos.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-24">
            <svg class="mx-auto mb-4 text-apple-text-tertiary opacity-30" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <p class="text-apple-text-tertiary text-[15px]">没有找到相关图片，换个关键词试试</p>
          </div>`;
        return;
      }

      const fragment = document.createDocumentFragment();
      photos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'masonry-item';
        item.style.animation = `fadeIn 0.4s cubic-bezier(0.25, 0.1, 0.25, 1) ${index * 0.04}s both`;
        item.innerHTML = `
          <div class="img-card relative cursor-pointer bg-apple-card group"
               onclick="openModal('${photo.src.large2x}', '${photo.photographer}', ${photo.width}, ${photo.height}, '${photo.src.original}')">
            <img src="${photo.src.medium}" alt="${photo.alt || photo.photographer}" loading="lazy" class="w-full block"
                 style="aspect-ratio: ${photo.width}/${photo.height}" />
            <div class="img-overlay absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-black/0 opacity-0 transition-opacity duration-300 flex flex-col justify-end p-4">
              <p class="text-white text-[13px] font-medium">${photo.photographer}</p>
              <p class="text-white/50 text-[11px] mt-0.5">${photo.width} × ${photo.height}</p>
            </div>
          </div>`;
        fragment.appendChild(item);
      });
      grid.appendChild(fragment);
    }

    function loadMore() { currentPage++; searchImages(true); }

    function quickSearch(query) {
      document.getElementById('searchInput').value = query;
      currentQuery = query;
      searchImages();
    }

    // ============ 搜索历史 ============
    function toggleHistory() {
      const panel = document.getElementById('historyPanel');
      const overlay = document.getElementById('historyOverlay');
      historyOpen = !historyOpen;

      if (historyOpen) {
        panel.style.transform = 'translateX(0)';
        overlay.classList.remove('hidden');
        loadHistory();
      } else {
        panel.style.transform = 'translateX(100%)';
        overlay.classList.add('hidden');
      }
    }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '<div class="flex justify-center py-8"><div class="apple-spinner"></div></div>';

      try {
        const res = await fetch('/api/history', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        const data = await res.json();

        if (!data.history || data.history.length === 0) {
          list.innerHTML = '<p class="text-apple-text-tertiary text-[13px] text-center py-8">暂无搜索记录</p>';
          return;
        }

        list.innerHTML = data.history.map(item => {
          const time = new Date(item.created_at).toLocaleString('zh-CN', {
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          return `
            <div class="history-item flex items-center justify-between py-3 px-3 cursor-pointer -mx-1"
                 onclick="quickSearch('${item.query.replace(/'/g, "\\'")}')">
              <div class="min-w-0">
                <p class="text-[14px] text-white truncate" style="letter-spacing: -0.01em;">${item.query}</p>
                <p class="text-[11px] text-apple-text-tertiary mt-0.5">${time}</p>
              </div>
              <svg class="flex-shrink-0 ml-2 text-apple-text-tertiary" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>`;
        }).join('');
      } catch (e) {
        list.innerHTML = '<p class="text-apple-text-tertiary text-[13px] text-center py-8">加载失败</p>';
      }
    }

    // ============ 弹窗预览 ============
    function openModal(imgUrl, photographer, width, height, originalUrl) {
      document.getElementById('modalImg').src = imgUrl;
      document.getElementById('modalPhotographer').textContent = photographer;
      document.getElementById('modalSize').textContent = width + ' × ' + height;
      document.getElementById('modalDownload').href = originalUrl;
      document.getElementById('modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!document.getElementById('modal').classList.contains('hidden')) {
          closeModal();
        } else if (historyOpen) {
          toggleHistory();
        }
      }
    });

    function copyImageUrl() {
      const url = document.getElementById('modalDownload').href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
        setTimeout(() => { btn.innerHTML = originalHTML; }, 2000);
      });
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }

    // 回车键支持
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (!document.getElementById('authPage').classList.contains('hidden')) {
          if (!document.getElementById('loginForm').classList.contains('hidden')) login();
          else register();
        }
        if (document.activeElement === document.getElementById('searchInput')) searchImages();
      }
    });

    // ============ 启动 ============
    init();
  </script>

</body>
</html>
